{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card shadow-sm border-0 mt-5">
            <div class="card-header bg-dark text-white text-center py-3">
                <h4 class="mb-0">Login</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        {{ form.as_p }}
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Sign In</button>
                    </div>
                </form>
            </div>
        </div>
        <p class="text-center mt-3 text-muted">Use your superuser credentials.</p>
    </div>
</div>
<p class="text-center mt-3">New user? <a href="{% url 'signup' %}">Create an account</a></p>
{% endblock %}
