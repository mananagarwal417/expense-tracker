{% extends 'base.html' %}
{% block content %}
<div class="row text-center mb-4">
    <div class="col-md-4"><div class="card p-3 shadow-sm"><h5>Balance</h5><h3>₹{{ balance }}</h3></div></div>
    <div class="col-md-4"><div class="card p-3 shadow-sm text-success"><h5>Income</h5><h3>+₹{{ income }}</h3></div></div>
    <div class="col-md-4"><div class="card p-3 shadow-sm text-danger"><h5>Expenses</h5><h3>-₹{{ expense }}</h3></div></div>
</div>

<a href="{% url 'add_transaction' %}" class="btn btn-primary mb-3">Add Transaction</a>

<table class="table bg-white shadow-sm">
    <thead><tr><th>Date</th><th>Title</th><th>Category</th><th>Amount</th></tr></thead>
    <tbody>
        {% for t in transactions %}
        <tr>
            <td>{{ t.date }}</td>
            <td>{{ t.title }}</td>
            <td>{{ t.category }}</td>
            <td class="{% if t.transaction_type == 'Expense' %}text-danger{% else %}text-success{% endif %}">
                {{ t.amount }}
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
